<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking Withdrawal Validation</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
      <form>
        <h1>withdrawAmount</h1>
        <label for="balance">Enter the balance</label>
        <input id="balance" type="number" placeholder="$">

        <label for="withdrawAmount">Enter the withdrawAmount</label>
        <input id="withdrawAmount" type="number" placeholder="$">

        <button type="button" onclick="status()">Validate</button>

        <p id="status"></p>
    </form>
    
    <script src="js/index.js"></script>
</body>
</html>
